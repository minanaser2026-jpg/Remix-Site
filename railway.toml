[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/remix-site run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30

# ── المتغيرات المطلوبة ──────────────────────────────────────────────────────
# Railway بيقرأ القسم ده ويعرضهم تلقائياً في الـ Variables tab
# الـ required بدون قيمة - لازم تحطها إنت
# الـ optional عندها قيمة افتراضية

[variables]
# مطلوب: بيئة التشغيل
NODE_ENV = "production"

# مطلوب: سر التشفير للـ sessions - غيّره لأي string عشوائي طويل
SESSION_SECRET = ""

# مطلوب: رابط Supabase - من Supabase → Settings → Database → URI
DATABASE_URL = ""

# اختياري: دومين مخصص غير railway.app
ALLOWED_ORIGINS = ""

# اختياري: Facebook Reels integration
FACEBOOK_PAGE_ACCESS_TOKEN = ""
FACEBOOK_PAGE_ID = ""
