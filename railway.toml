[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/remix-site run build && pnpm --filter @workspace/api-server run build"
watchPatterns = ["artifacts/api-server/**", "artifacts/remix-site/**", "lib/**", "railway.toml", "package.json", "pnpm-lock.yaml"]

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30

[variables]
NODE_ENV = "production"
SESSION_SECRET = "change-this-to-a-random-secret-string-32chars"
DATABASE_URL = "postgresql://postgres:password@db.your-project.supabase.co:5432/postgres"
ALLOWED_ORIGINS = ""
FACEBOOK_PAGE_ACCESS_TOKEN = ""
FACEBOOK_PAGE_ID = ""
LOG_LEVEL = "info"
LOG_PRETTY = "false"
