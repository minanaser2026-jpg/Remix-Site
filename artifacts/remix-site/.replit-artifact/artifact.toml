kind = "web"
previewPath = "/"
title = "Remix — Official Website"
version = "1.0.0"
id = "artifacts/remix-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22884

[services.development]
run = "pnpm --filter @workspace/remix-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remix-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/remix-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22884"
BASE_PATH = "/"
